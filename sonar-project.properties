# SonarCloud Configuration for Filtarr
sonar.projectKey=wesleykirkland_Filtarr
sonar.organization=wesleykirkland

# Project metadata
sonar.projectName=Filtarr
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.test.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.js,**/*.config.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/tests/**,src/server/index.ts,src/client/main.tsx

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8

# TypeScript specific
sonar.typescript.tsconfigPath=tsconfig.json

