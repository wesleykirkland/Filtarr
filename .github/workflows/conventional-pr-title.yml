name: Conventional PR title

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-title:
    name: Validate conventional PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate pull request title
        run: node scripts/validate-conventional-pr-title.mjs "${{ github.event.pull_request.title }}"
